{% extends "layout.html" %}

{% block content %}
  <section class="panel form-panel">
    <h2>{% if alert_rule %}Edit alert{% else %}Add alert{% endif %}</h2>

    {% if checks %}
      <form method="post" class="check-form">
        <label>
          <span>Name</span>
          <input type="text" name="name" maxlength="40" value="{{ request.form.get('name', alert_rule.name if alert_rule else '') }}" required>
        </label>

        <fieldset>
          <legend>Monitors</legend>
          <div class="checkbox-list">
            {% for check in checks %}
              <label class="checkbox-row">
                <input type="checkbox" name="check_ids" value="{{ check.id }}" {% if check.id in selected_check_ids %}checked{% endif %}>
                <span>{{ check.name }}</span>
              </label>
            {% endfor %}
          </div>
        </fieldset>

        <div class="grid two-col">
          <label>
            <span>Alert after X failures</span>
            <input type="number" min="1" name="alert_failures" value="{{ request.form.get('alert_failures', alert_rule.alert_failures if alert_rule else 3) }}" required>
          </label>

          <label>
            <span>Within Y minutes</span>
            <input type="number" min="1" name="alert_window_minutes" value="{{ request.form.get('alert_window_minutes', alert_rule.alert_window_minutes if alert_rule else 15) }}" required>
          </label>
        </div>

        <div class="form-actions">
          <button type="button" onclick="window.location='{{ url_for('alerts_screen') }}'">Cancel</button>
          <button type="submit">Save</button>
        </div>
      </form>
    {% else %}
      <p>No monitors yet.</p>
    {% endif %}
  </section>
{% endblock %}
