<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>guywatchingscreen</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <div>
          <h1>guywatchingscreen</h1>
          <p><a href="{{ url_for('dashboard') }}">Monitors</a> | <a href="{{ url_for('alerts_screen') }}">Alerts</a> | <a href="{{ url_for('communication_screen') }}">Communication</a></p>
        </div>
      </header>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <section class="flash-list">
            {% for category, message in messages %}
              <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
          </section>
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
