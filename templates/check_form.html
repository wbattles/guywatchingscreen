{% extends "layout.html" %}

{% block content %}
  <section class="panel form-panel">
    <h2>{% if check %}Edit check{% else %}Add check{% endif %}</h2>

    <form method="post" class="check-form">
      <label for="check-name">
        <span>Name</span>
        <input id="check-name" type="text" name="name" value="{{ request.form.get('name', check.name if check else '') }}" required>
      </label>

      <label for="check-url">
        <span>URL</span>
        <input id="check-url" type="url" name="url" value="{{ request.form.get('url', check.url if check else '') }}" required>
      </label>

      <div class="grid two-col">
        <label for="check-frequency-minutes">
          <span>Frequency (minutes)</span>
          <input id="check-frequency-minutes" type="number" min="1" name="frequency_minutes" value="{{ request.form.get('frequency_minutes', check.frequency_minutes if check else 5) }}" required>
        </label>

        <label for="check-timeout-seconds">
          <span>Timeout (seconds)</span>
          <input id="check-timeout-seconds" type="number" min="1" name="timeout_seconds" value="{{ request.form.get('timeout_seconds', check.timeout_seconds if check else 10) }}" required>
        </label>
      </div>

      <label for="check-blackout-periods">
        <span>Blackout periods</span>
        <textarea id="check-blackout-periods" name="blackout_periods" rows="5" placeholder="23:00-06:00&#10;12:30-13:00" aria-describedby="blackout-help">{{ request.form.get('blackout_periods', check.blackout_periods if check else '') }}</textarea>
      </label>
      <small id="blackout-help">One range per line. Format: HH:MM-HH:MM</small>

      <div class="form-actions">
        <button type="submit" formaction="{{ url_for('dashboard') }}" formmethod="get" formnovalidate>Cancel</button>
        <button type="submit">Save</button>
      </div>
    </form>

    {% if check %}
      <section class="form-actions" style="margin-top: 16px;">
        <form method="post" action="{{ url_for('delete_check', check_id=check.id) }}" onsubmit="return confirm('Delete this website?');">
          <button type="submit">Delete website</button>
        </form>
      </section>
    {% endif %}
  </section>
{% endblock %}
